org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true

android.useAndroidX=true
android.enableJetifier=true

# Suppress Kotlin JVM target compatibility warnings (Kotlin 2.x + AGP 8.x)
kotlin.jvm.target.validation.mode=WARNING

# Allow old plugins without namespace declaration (AGP 8.x)
android.suppressUnsupportedOptionWarnings=android.suppressUnsupportedCompileSdk
android.suppressUnsupportedCompileSdk=36
